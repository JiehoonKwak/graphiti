services:
  neo4j:
    image: neo4j:5.26.0-enterprise
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:7474 || exit 1",
        ]
      interval: 1s
      timeout: 10s
      retries: 10
      start_period: 3s
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - ~/neo4j-data/graphiti/data:/data
      - ~/neo4j-data/graphiti/logs:/logs
      - ~/neo4j-data/graphiti/import:/var/lib/neo4j/import
      - ~/neo4j-data/graphiti/plugins:/plugins
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-demodemo}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
      - NEO4J_server_config_strict__validation_enabled=false
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*,bloom.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*,apoc.*,bloom.*

  graphiti-mcp:
    image: zepai/knowledge-graph-mcp:latest
    ports:
      - "8000:8000" # SSE endpoint
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      # Database configuration
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-demodemo}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - USE_PARALLEL_RUNTIME=true
      
      # OpenAI configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      
      # Graphiti configuration
      - GRAPHITI_GROUP_ID=${GRAPHITI_GROUP_ID:-main}
      - SEMAPHORE_LIMIT=${SEMAPHORE_LIMIT:-8}
      - USER_ID=${USER_ID:-mcp_user}
      
      # Server configuration
      - PORT=8000
      - TRANSPORT=sse
    volumes:
      - ./config/config-custom-fixed.yaml:/app/config/config.yaml:ro
    command: ["uv", "run", "graphiti_mcp_server.py", "--transport", "sse", "--host", "0.0.0.0"]