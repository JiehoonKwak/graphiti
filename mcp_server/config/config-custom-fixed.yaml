# Graphiti MCP Server Configuration
# Fixed to match working schema - removes invalid sections
# This file supports environment variable expansion using ${VAR_NAME} or ${VAR_NAME:default_value}

server:
  transport: "sse"
  host: "0.0.0.0"
  port: 8000

llm:
  provider: "openai"
  model: "gpt-5-mini"
  temperature: 0.0
  max_tokens: 4096
  small_model: "gpt-5-nano"

  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      api_url: ${OPENAI_API_URL:https://api.openai.com/v1}
      organization_id: ${OPENAI_ORGANIZATION_ID:}

    azure_openai:
      api_key: ${AZURE_OPENAI_API_KEY}
      api_url: ${AZURE_OPENAI_ENDPOINT}
      api_version: ${AZURE_OPENAI_API_VERSION:2024-10-21}
      deployment_name: ${AZURE_OPENAI_DEPLOYMENT}
      use_azure_ad: ${USE_AZURE_AD:false}

    anthropic:
      api_key: ${ANTHROPIC_API_KEY}
      api_url: ${ANTHROPIC_API_URL:https://api.anthropic.com}
      max_retries: 3

    gemini:
      api_key: ${GOOGLE_API_KEY}
      project_id: ${GOOGLE_PROJECT_ID:}
      location: ${GOOGLE_LOCATION:us-central1}

    groq:
      api_key: ${GROQ_API_KEY}
      api_url: ${GROQ_API_URL:https://api.groq.com/openai/v1}

embedder:
  provider: "openai"
  model: "text-embedding-3-small"
  dimensions: 1536

  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      api_url: ${OPENAI_API_URL:https://api.openai.com/v1}
      organization_id: ${OPENAI_ORGANIZATION_ID:}

    azure_openai:
      api_key: ${AZURE_OPENAI_API_KEY}
      api_url: ${AZURE_OPENAI_EMBEDDINGS_ENDPOINT}
      api_version: ${AZURE_OPENAI_API_VERSION:2024-10-21}
      deployment_name: ${AZURE_OPENAI_EMBEDDINGS_DEPLOYMENT}
      use_azure_ad: ${USE_AZURE_AD:false}

    gemini:
      api_key: ${GOOGLE_API_KEY}
      project_id: ${GOOGLE_PROJECT_ID:}
      location: ${GOOGLE_LOCATION:us-central1}

    voyage:
      api_key: ${VOYAGE_API_KEY}
      api_url: ${VOYAGE_API_URL:https://api.voyageai.com/v1}
      model: "voyage-3"

database:
  provider: "neo4j"

  providers:
    neo4j:
      uri: ${NEO4J_URI:bolt://localhost:7687}
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:demodemo}
      database: ${NEO4J_DATABASE:neo4j}
      use_parallel_runtime: ${USE_PARALLEL_RUNTIME:true}

    falkordb:
      uri: ${FALKORDB_URI:redis://localhost:6379}
      password: ${FALKORDB_PASSWORD:}
      database: ${FALKORDB_DATABASE:default_db}

    kuzu:
      db: ${KUZU_DB::memory:}
      max_concurrent_queries: ${KUZU_MAX_CONCURRENT_QUERIES:1}

graphiti:
  group_id: ${GRAPHITI_GROUP_ID:main}
  episode_id_prefix: ${EPISODE_ID_PREFIX:}
  user_id: ${USER_ID:mcp_user}
  entity_types:
    # Core Personal Entities
    - name: "Person"
      description: "Individuals, contacts, relationships, colleagues, friends, family members with whom you interact"
    - name: "Project" 
      description: "Personal projects, professional initiatives, goals, objectives, and ongoing endeavors"
    - name: "Skill"
      description: "Technical skills, knowledge areas, expertise levels, competencies, and abilities"
    - name: "Memory"
      description: "Personal experiences, events, important moments, learnings, and significant occurrences"
    - name: "Resource"
      description: "Documents, links, tools, references, bookmarks, files, and informational assets"
    - name: "Task"
      description: "Todo items, action items, commitments, deadlines, and things that need to be done"
    - name: "Insight"
      description: "Observations, conclusions, epiphanies, realizations, learnings, and important discoveries"
    
    # Knowledge Organization
    - name: "Topic"
      description: "Subject areas, domains of knowledge, themes, categories, and areas of interest"
    - name: "Question"
      description: "Open questions, research queries, things to explore, and unresolved inquiries"
    - name: "Decision"
      description: "Choices made, rationales, alternatives considered, and decision-making processes"
    
    # Temporal Entities
    - name: "Event"
      description: "Meetings, conferences, appointments, occurrences, and scheduled activities"
    - name: "Milestone"
      description: "Achievements, completions, significant markers, and important accomplishments"
    
    # Enhanced Existing Types
    - name: "Requirement"
      description: "Technical requirements, business needs, specifications, constraints, and functional requirements"
    - name: "Preference"
      description: "User preferences, settings, likes, dislikes, configuration choices, and personal inclinations"
    - name: "Procedure"
      description: "Standard operating procedures, workflows, how-to instructions, processes, and methodologies"
